<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salvemos el Planeta - GreenTech</title>

    <!--elimino enlaces a bootstrap y fontawesome(obligan al navegador a descargar archivos muy grandes)-->
    <!---->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;700;900&display=swap"
      rel="stylesheet"
    />


    <style>
      body {
        font-family: "Montserrat", sans-serif;
        background-color: #f4fdf4;
        margin: 0;
      }
      .hero-gigante {
        /* q=75 calidad al 75% y w=1920 ancho maximo a la URL*/
        background-image: url("https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?q=75&w=1920&auto=format&fit=crop");
        background-size: cover;
        background-position: center;
        height: 100vh;
         color: white;
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
      }
      /*display-1 y fw-bold definidos manualmente*/
      h1 {
        font-size: 4.5rem; /* equivalente a display-1 */
        font-weight: 700;   /* equivalente a fw-bold */
        margin: 0;
      }
      .texto-subtitulo {
        font-size: 1.75rem; 
        margin-top: 15px;    
        font-weight: 300;
      }

      .footer-estilo {
        background-color: #212529; 
        color: white;              
        text-align: center;       
        padding: 15px;          
      }
      .btn-eco-redundante {
        background-color: #28a745 ;
        border-color: #1e7e34 ;
        padding: 15px 40px;
        font-size: 1.5rem;
        border-radius: 50px;
        box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="hero-gigante">
      <h1 >Salvemos el Planeta</h1>
    <!--cambio de nombre de la clase-->
      <p class="texto-subtitulo">Únete a la revolución verde de GreenTech.</p>

    <!--cambio de nombre de la clase-->
      <button class="btn-eco-redundante">
        <!--sustituyo fa-solid(icono de fontawesome) con &#127811;(texto plano)-->
        <i class="icon-leaf">&#127811;</i> Quiero ayudar
      </button>
    </div>


    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
   <!--elimino .js de bootstrap-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script>
      $(document).ready(function () {
        const anioActual = moment().format("YYYY");
        $("body").append(
    /*cambio de nombre de la clase*/
          '<footer class="footer-estilo" style="width: 100%;">GreenTech Solutions &copy; ' +
            anioActual +
            " - Haciendo un mundo mejor (pero calentando tu CPU)</footer>",
        );
      });
    </script>
  </body>
</html>
